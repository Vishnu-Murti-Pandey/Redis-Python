services:

  backend:
    build: .
    container_name: site-banner-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
  worker:
    build: .
    container_name: site-banner-worker
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    command: python worker.py

  postgres:
    image: postgres:16
    container_name: site-banner-postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: site_banner

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: site-banner-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: